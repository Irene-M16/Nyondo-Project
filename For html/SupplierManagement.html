<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Supplier</title>
    <link rel="stylesheet" href="../../for css/supplierm.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="profile">
             <div class="avatar"></div>
           <div>
             <h3>Munguromo Irene</h3>
              <p>The Creator</p>
            </div>
            </div>
            <div><a href="Dashboard.html" class="sidebarlinks">Dashboard</a></div>

            <div><a href="SalesManagement.html" class="sidebarlinks">Sales Management</a></div>

            <div><a href="SupplierManagement.html" class="sidebarlinks">Supplier Management</a></div>

            <div><a href="StockManegement.html" class="sidebarlinks">Stock Management</a></div>

          <div><a href="TransportManagement.html"          class="sidebarlinks">Transport Management</a></div>
        </div>

        <form>
               <section>
                <div class="content">
                  
                  <h1 class="title1">Supplier Registration Form</h1>
                    <div class="input-content">
                        <div class="input1">
                            <label for="saledate">Business Owner</label><br>
                            <input type="text" class="input" placeholder="First Name">
                        </div>
                        <div class="input2">
                            <input type="text" class="input" placeholder="Last Name">
                        </div>
                    </div>




                 
                    <div class="name">
                        <div class="phone">
                        <div class="details">
                            <label for="name" class="input-content">Business Name</label><br>
                            <input type="text" class="input" placeholder="Enter your business name" required>
                        </div>
                        <div class="details">
                            <label for="phone" class="input-content">Phone Number</label><br>
                            <input type="phone" class="input" placeholder="Enter Phone Number" required>
                        </div>
                        </div>


                        <div class="email">
                           <div class="details"
                               <label for="email" class="input-content">Email</label><br>
                               <input type="email" class="input" placeholder="Enter email">
                            </div>
                            <div class="details">
                              <label for="customertype" class="input-content">Customer Type</label><br>
                            <select name="customertype" class="input" id="">
                                <option value="" disabled selected>Select customer type</option>
                                <option value="1">Regular Customer</option>
                                <option value="2">Occasional Customer</option>
                                <option value="3">One-time Customer</option>
                                <option value="4">Plumber</option>
                                <option value="5">Contractors</option>
                            </select>
                            </div>
                        </div>
                    </div>

                   
                    <div>
                       <label for="supplier">Tax Identification Number</label><br>
                        <input type="number" class="input" placeholder="1008904187">
                    </div>
                   
                        <h3 class="title1">Bank Account Details</h3>
                 <div>
                    <div class="bank1">
                      <div>
                        <label for="supplier">Account Holder Name</label><br>
                        <input type="text" class="input" placeholder="Name Of the Account">
                    </div>
                     <div>
                        <label for="supplier">Bank Name</label><br>
                        <input type="text" class="input" placeholder="Stanbic,Centenary, ....etc">
                    </div>

                     <div>
                        <label for="Supplier">Account Type</label><br>
                        <input type="text" class="input" placeholder="Assets, Liabilities,...etc">
                    </div>
                    </div>
                     <div class="bank2">
                     <div>
                        <label for="supplier">Account Number</label><br>
                        <input type="number" class="input" placeholder="1234567890">
                    </div>

                     <div>
                        <label for="supplier">Routing Number</label><br>
                        <input type="text" class="input" placeholder="012345">
                    </div>

                     <div>
                        <label for="supplier">Currency</label><br>
                        <input type="number" class="input" placeholder="Ugx,USD,...">
                      </div>
                     </div>
                    </div>

                       <div>
                        <label for="State"class="input-content" >Address</label> <br>
                        <input type="text" class="input" placeholder="Street Address">
                    </div>
                    <br>
                <div class="items">
                    <div>
                        <input type="text" class="input" placeholder="Region">
                    </div>
                    <div>
                        <input type="text" class="input" placeholder="City">
                    </div>
                    </div>
                    <div class="items">
                        <div>
                            <input type="text" class="input" placeholder="Country">
                        </div>
                    </div>
                    <div class="buttons"> 
                     <button class="button">Submit</button>
                    </div>
                </div>
            </section>
        </form>
    </div>
</body>
</html>
